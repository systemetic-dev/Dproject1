<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>post-list</title>
</head>
<body>
    <h1>Posts</h1>

    {% for post in posts %}
        <h2>
            <a href="{{ post.slug }}">{{ post.title }}</a>
        </h2>
    {% empty %}
    <p>No posts available.</p>
    {% endfor %}
</body>
</html>
